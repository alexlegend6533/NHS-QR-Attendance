<div class="admin-panel">
    <div id="attendance-form">
        <h2>NHS Meeting Attendance</h2>
        <p id="status-msg" style="color: var(--accent);"></p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="user-email" placeholder="any@email.com" required>
        </div>

        <div class="input-group">
            <label>Meeting Date</label>
            <input type="date" id="meeting-date" required>
        </div>

        <div class="input-group">
            <label>Meeting Password</label>
            <input type="password" id="meeting-pass" placeholder="Enter code" required>
        </div>

        <button onclick="submitAttendance()" id="submit-btn">Submit Attendance</button>
    </div>

    <div id="blocked-message" style="display:none; text-align: center;">
        <h3 style="color: #ef4444;">Access Restricted</h3>
        <p>This device has already submitted attendance for today's session.</p>
    </div>
</div>

<script>
    // 1. Check if the device is already blocked on load
    window.onload = function() {
        if (localStorage.getItem('nhs_submitted_today')) {
            showBlocked();
        }
    };

    function showBlocked() {
        document.getElementById('attendance-form').style.display = 'none';
        document.getElementById('blocked-message').style.display = 'block';
    }

    function submitAttendance() {
        const email = document.getElementById('user-email').value;
        const date = document.getElementById('meeting-date').value;
        const pass = document.getElementById('meeting-pass').value;
        const msg = document.getElementById('status-msg');

        // Basic Validation
        if (!email || !date || !pass) {
            msg.innerText = "Please fill out all fields.";
            return;
        }

        // Logic: Accept any email, but validate password (example: "NHS2026")
        if (pass === "YOUR_SECRET_PASSWORD") {
            // SUCCESS
            alert("Attendance recorded for " + email);
            
            // 2. BLOCK THE DEVICE
            localStorage.setItem('nhs_submitted_today', 'true');
            showBlocked();
            
            // Here you would typically send the data to a Google Sheet or Firebase
            console.log("Submitting:", { email, date, pass });
        } else {
            msg.innerText = "Incorrect Meeting Password.";
        }
    }
</script>
