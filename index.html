<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NHS | Attendance Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* LEFT SIDE: CONTROL PANEL */
        .admin-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            padding: 60px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* RIGHT SIDE: QR DISPLAY */
        .qr-panel {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0f1a 100%);
        }
        .input-group {
            width: 100%;
            max-width: 380px;
            margin-bottom: 40px;
        }
        label {
            display: block;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-size: 0.8rem;
        }
        .editable-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 22px;
            font-size: 2.2rem;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 300;
        }
        .editable-box:focus {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }
        .qr-container {
            background: white;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 0 80px rgba(56, 189, 248, 0.15);
            margin: 30px 0;
            transition: transform 0.2s ease;
        }
        #timer {
            font-size: 110px;
            color: var(--accent);
            font-weight: 200;
            margin-bottom: -15px;
            font-variant-numeric: tabular-nums;
        }
        #sync-status {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        h1 {
            font-weight: 800;
            letter-spacing: 5px;
            font-size: 1.4rem;
            color: var(--text-dim);
            margin-bottom: 0;
        }
        .footer-note {
            margin-top: 25px;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="sync-status">● SYSTEM LIVE</div>
    
    <div class="admin-panel">
        <div class="input-group">
            <label>Current Session Date</label>
            <input type="text" class="editable-box" id="displayDate" value="03/04/2026">
        </div>
        <div class="input-group">
            <label>Meeting Password</label>
            <input type="text" class="editable-box" id="displayPass" value="Service">
        </div>
    </div>

    <div class="qr-panel">
        <h1>NHS ATTENDANCE</h1>
        <div id="timer">10s</div>
        <div class="qr-container" id="qr-wrapper">
            <div id="qrcode"></div>
        </div>
        <div class="footer-note">SECURE IDENTITY VERIFICATION</div>
    </div>

    <script>
        // INTEGRATED DEPLOYMENT LINK
        const BASE_URL = "https://script.google.com/macros/s/AKfycbxBID9_n7gYR2OSUwg27jxQ0aezTCFHaaVg8ZPJ3OOn8y8O_89s257IEKFSGnkml6ys1Q/exec";
        let drift = 0;

        // Sync with Google Server Time to prevent clock lag
        async function syncServer() {
            try {
                const start = Date.now();
                const res = await fetch(BASE_URL + "?action=sync");
                const data = await res.json();
                // Calculate time difference between local and server
                drift = (data.serverTime + ((Date.now() - start) / 2)) - Date.now();
                console.log("Sync complete. Drift: " + drift + "ms");
            } catch (e) {
                console.warn("Sync failed. Check internet connectivity.");
            }
            genQR();
        }

        function genQR() {
            const container = document.getElementById("qrcode");
            container.innerHTML = "";
            
            // Generate Key Index (10000ms = 10 second window)
            const now = Date.now() + drift;
            const key = Math.floor(now / 10000); 

            new QRCode(container, {
                text: `${BASE_URL}?key=${key}`,
                width: 400,
                height: 400,
                correctLevel : QRCode.CorrectLevel.M 
            });
            
            // Subtle flash effect on refresh
            const wrapper = document.getElementById("qr-wrapper");
            wrapper.style.transform = "scale(1.02)";
            setTimeout(() => wrapper.style.transform = "scale(1)", 100);
        }

        // 10-Second Countdown Logic
        let timeLeft = 10;
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                genQR();
                timeLeft = 10;
            }
            document.getElementById('timer').innerText = timeLeft + "s";
        }, 1000);

        // Initial launch
        syncServer();
        // Background re-sync every 2 minutes for precision
        setInterval(syncServer, 120000);
    </script>
</body>
</html>
