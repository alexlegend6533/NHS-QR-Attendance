<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NHS | Attendance Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .admin-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            padding: 60px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .qr-panel {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0f1a 100%);
        }
        .input-group {
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
        }
        label {
            display: block;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-size: 0.75rem;
        }
        .editable-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 20px;
            font-size: 1.8rem;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }
        .editable-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }
        .qr-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(56, 189, 248, 0.1);
            margin: 20px 0;
        }
        #timer {
            font-size: 100px;
            color: var(--accent);
            font-weight: 200;
            margin-bottom: -10px;
        }
        h1 {
            font-weight: 800;
            letter-spacing: 5px;
            font-size: 1.2rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <div class="input-group">
            <label>Current Session Date</label>
            <input type="text" class="editable-box" id="displayDate" value="04/01/2026">
        </div>
        <p style="color: var(--text-dim); font-size: 0.8rem; text-align: center;">
            Password and Date validation enabled.<br>Google Login requirement: <b>BYPASSED</b>.
        </p>
    </div>

    <div class="qr-panel">
        <h1>NHS ATTENDANCE</h1>
        <div id="timer">10s</div>
        <div class="qr-container" id="qr-wrapper">
            <div id="qrcode"></div>
        </div>
    </div>

    <script>
        // YOUR NEW DEPLOYMENT LINK
        const BASE_URL = "https://script.google.com/macros/s/AKfycbxU2mteTDORjA2NxUgojgnArbiteEaeGgqGHnbowZq5P_o93L3T40yID_oRao0TwACErg/exec";
        let drift = 0;

        async function syncServer() {
            try {
                const start = Date.now();
                const res = await fetch(BASE_URL + "?action=sync");
                const data = await res.json();
                drift = (data.serverTime + ((Date.now() - start) / 2)) - Date.now();
            } catch (e) {
                console.warn("Syncing...");
            }
            genQR();
        }

        function genQR() {
            const container = document.getElementById("qrcode");
            container.innerHTML = "";
            const now = Date.now() + drift;
            const key = Math.floor(now / 15000); 

            new QRCode(container, {
                text: `${BASE_URL}?key=${key}`,
                width: 380,
                height: 380,
                correctLevel : QRCode.CorrectLevel.M 
            });
        }

        let timeLeft = 10;
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                genQR();
                timeLeft = 10;
            }
            document.getElementById('timer').innerText = timeLeft + "s";
        }, 1000);

        syncServer();
        setInterval(syncServer, 60000);
    </script>
</body>
</html>
